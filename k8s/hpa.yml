apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: comment-manager-backend-hpa
  labels:
    app: comment-manager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: comment-manager-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      selectPolicy: Min

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: comment-manager-frontend-hpa
  labels:
    app: comment-manager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: comment-manager-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
