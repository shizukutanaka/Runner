apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-data-pvc
  labels:
    app: comment-manager
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

