apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-manager-backend
  labels:
    app: comment-manager
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: comment-manager
      component: backend
  template:
    metadata:
      labels:
        app: comment-manager
        component: backend
    spec:
      containers:
      - name: backend
        image: comment-manager-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "4000"
        - name: DATABASE_PATH
          value: "/app/data/comments.db"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: comment-manager-secrets
              key: redis-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: comment-manager-secrets
              key: openai-api-key
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: comment-manager-secrets
              key: jwt-secret
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: comment-manager-secrets
              key: session-secret
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        - name: backups
          mountPath: /app/backups
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: backend-data-pvc
      - name: logs
        persistentVolumeClaim:
          claimName: backend-logs-pvc
      - name: backups
        persistentVolumeClaim:
          claimName: backend-backups-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-manager-frontend
  labels:
    app: comment-manager
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: comment-manager
      component: frontend
  template:
    metadata:
      labels:
        app: comment-manager
        component: frontend
    spec:
      containers:
      - name: frontend
        image: comment-manager-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: comment-manager
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comment-manager
      component: redis
  template:
    metadata:
      labels:
        app: comment-manager
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        args:
        - redis-server
        - --appendonly
        - "yes"
        - --maxmemory
        - "256mb"
        - --maxmemory-policy
        - "allkeys-lru"
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-data-pvc
